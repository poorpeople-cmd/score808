name: Project 3 - Virtual Screen Streamer (Anti-Block)

on:
  workflow_dispatch:
    inputs:
      player_url:
        description: 'Direct Player Link (e.g., https://ppdd18.plaifrdcikf.shop/live.html?...)'
        required: true
        type: string
      stream_id:
        description: 'Select Stream Server ID (1, 2, 3, or 4)'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
        default: '1'

jobs:
  run-virtual-stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 Ghante ki limit

    steps:
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg xvfb pulseaudio dbus-x11 google-chrome-stable xdotool

    - name: Start Broadcasting to OK.ru
      run: |
        echo "🚀 Naqli Screen Setup Aur Google Chrome..."
        
        # Stream Keys
        case "${{ inputs.stream_id }}" in
          "1") STREAM_KEY="14601603391083_14040893622891_puxzrwjniu" ;;
          "2") STREAM_KEY="14601696583275_14041072274027_apdzpdb5xi" ;;
          "3") STREAM_KEY="14617940008555_14072500914795_ohw67ls7ny" ;;
          "4") STREAM_KEY="14601972227691_14041593547371_obdhgewlmq" ;;
          *) STREAM_KEY="14601603391083_14040893622891_puxzrwjniu" ;;
        esac

        # 1. Fake Audio Setup
        pulseaudio -D --exit-idle-time=-1
        pacmd load-module module-virtual-sink sink_name=v1
        set -x default-sink v1
        set -x default-source v1.monitor

        # 2. Fake Screen Setup (854x480)
        export DISPLAY=:99
        Xvfb :99 -screen 0 854x480x24 &
        sleep 2

        export DBUS_SESSION_BUS_ADDRESS=/dev/null

        # 3. Google Chrome Start
        echo "🌍 Chrome Par Match Khol Rahe Hain..."
        google-chrome --window-size=854,480 --kiosk --start-fullscreen --no-sandbox --disable-dev-shm-usage --disable-gpu --autoplay-policy=no-user-gesture-required "${{ inputs.player_url }}" &
        
        # Chrome ko poora load hone dein (15 seconds)
        sleep 15 

        # 4. Asal Trick: Fake Mouse Click (Play Button dabane ke liye)
        echo "🖱️ Screen ke beech mein Click kar rahe hain taake Play ho jaye..."
        xdotool mousemove 427 240 click 1
        sleep 2
        # Ek aur click ihtiyat ke taur par
        xdotool click 1

        # 5. FFmpeg se Screen Capture
        echo "🎥 Screen Recording aur Streaming Shuru!"
        ffmpeg -thread_queue_size 1024 -f x11grab -video_size 854x480 -framerate 20 -i :99 \
               -thread_queue_size 1024 -f pulse -i default \
               -c:v libx264 -preset ultrafast -b:v 800k -maxrate 800k -bufsize 1600k \
               -c:a aac -b:a 96k -ac 2 \
               -f flv "rtmp://vsu.okcdn.ru/input/$STREAM_KEY"
















